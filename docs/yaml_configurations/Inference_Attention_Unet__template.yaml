############################################################## (Recomended) ############################################################
######################## If you want to infer with the Jupyter Lab only define model options preprocesing and post processing #########################
mode: inference

data:
  inference_input:
    dir: /path/to/the/input/dir
    data_type: .tiff
    #Your data format
    reader_params:
      dimension_order_out: "CZYX"
      C: 0
      T: 0
      Z: 0
      X: 0
      Y: 0
  preprocess:
    - module_name: monai.transforms
      func_name: NormalizeIntensity
      params:
        channel_wise: True
  postprocess:
    - module_name: mmv_im2im.postprocessing.basic_collection
      func_name: generate_classmap
#classic model configuration (same used for training)
model:
  framework: FCN
  net:
    module_name: monai.networks.nets
    func_name: AttentionUnet
    params:
      in_channels: 1 # nuber of channels in the input IM
      out_channels: 2 # one per class
      spatial_dims: 3 # 2d or 3d for convolutions
      channels: [32, 64, 128, 256, 512]
      strides: [1, 2, 2, 2, 2]
      dropout: 0.2
  checkpoint:  /path/to/the/ckpt/file/with/model/weights
  model_extra:
    cpu_only: False
trainer:
  verbose: True
  params:
    gpus: 1
    precision: 32